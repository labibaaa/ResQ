<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQ Login</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">


    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;700&display=swap"
        rel="stylesheet">


</head>

<body>

    <div class="login-container">

        <h1 class="login-title">RESQ</h1>

        <p class="login-subtitle">
            EMERGENCY ACCESS PORTAL
        </p>

        <form>
            <div class="input-box">
    <label>Select Role</label>

        <select>
        <option>Volunteer</option>
        <option>Authority</option>
       </select>
            </div>

            <div class="input-box">
                <label>Username / Email</label>
                <input type="text" placeholder="Enter username or email">
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <a href="home.html" class="login-btn">Log in</a>

        </form>

    </div>

</body>
<style>

        body{
            background:#1a1a1a;
            min-height: 120vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container{
            width: 400px;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 75px;
            backdrop-filter: blur(5px);
        }

        .login-title{
            font-family: 'Anton', sans-serif;
            font-size: 55px;
            color: white;
            letter-spacing: 4px;
            margin-bottom: 14px;
            text-align: center;
        }

        .login-subtitle{
            color: #6f1418;
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: 2px;
            font-size: 20px;
        }

        .input-box{
            margin-bottom: 30px;
        }

        .input-box label{
            display: block;
            color: white;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .input-box input{
            width: 89%;
            padding: 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .input-box input:focus{
            border: 1px solid #8d1f24;
        }

        .login-btn{
    width: 93%;
    padding: 16px;
    border: none;
    background: #8d1f24;
    color: white;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    font-size: 15px;

    display: block;
    text-align: center;
    text-decoration: none;
}

        .login-btn:hover{
            background: black;
        }
        .input-box select{
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: white;
    outline: none;
    font-size: 14px;
}

.input-box select:focus{
    border: 1px solid #8d1f24;
}

    </style>

}
</html>
