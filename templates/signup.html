<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQ Signup</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="signup-container">

        <h1 class="signup-title">RESQ</h1>

        <p class="signup-subtitle">
            CREATE EMERGENCY RESPONSE ACCOUNT
        </p>

        <!-- Toggle Buttons -->
        <div class="toggle-buttons">
            <button class="toggle-btn">Volunteer</button>
            <button class="toggle-btn">Authority</button>
        </div>

        <form>

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Enter full name">
            </div>

            <div class="input-box">
                <label>Username</label>
                <input type="text" placeholder="Enter username">
            </div>

            <div class="input-box">
                <label>National ID (NID) Number</label>
                <input type="text" placeholder="Enter NID number">
            </div>

            <div class="input-box">
                <label>Contact Number</label>
                <input type="text" placeholder="Enter contact number">
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" placeholder="Enter email address">
            </div>

            <div class="input-box">
                <label>Occupation</label>
                <input type="text" placeholder="Enter occupation">
            </div>

            <div class="input-box">
                <label>Workplace / Organization</label>
                <input type="text" placeholder="Enter workplace or organization">
            </div>

            <div class="input-box">
                <label>Address</label>
                <textarea placeholder="Enter address"></textarea>
            </div>

            <div class="input-box">
                <label>Date of Birth</label>
                <input type="date">
            </div>

            <div class="input-box">
                <label>Emergency Contact</label>
                <input type="text" placeholder="Enter emergency contact">
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password">
            </div>

            <div class="input-box">
                <label>Verification Documents Upload</label>
                <input type="file">
            </div>

           <a href="home.html" class="signup-btn">SIGNUP</a>



        </form>

    </div>

</body>

<style>

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background: #1a1a1a;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 0;
        font-family: 'Oswald', sans-serif;
    }

    .signup-container{
        width: 700px;
        background: rgba(0,0,0,0.80);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 60px;
        backdrop-filter: blur(5px);
    }

    .signup-title{
        font-family: 'Anton', sans-serif;
        font-size: 60px;
        color: #8d1f24;
        letter-spacing: 5px;
        margin-bottom: 10px;
        text-align: center;
    }

    .signup-subtitle{
        color:darkgray ;
        text-align: center;
        margin-bottom: 35px;
        letter-spacing: 2px;
        font-size: 18px;
    }

    .toggle-buttons{
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 40px;
    }

    .toggle-btn{
    padding: 12px 30px;
    background: black;
    color: white;
    border: 1px solid white;
    cursor: pointer;
    letter-spacing: 1px;
    transition: 0.3s;
    font-size: 14px;
}

.toggle-btn:hover{
    background: white;
    color: black;
}
.toggle-btn.active {
    background: white;
     color:black;
}
    .input-box{
        margin-bottom: 25px;
    }

    .input-box label{
        display: block;
        color: white;
        margin-bottom: 10px;
        letter-spacing: 1px;
        font-size: 14px;
    }

    .input-box input,
    .input-box textarea{
        width: 100%;
        padding: 16px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: white;
        outline: none;
        font-size: 14px;
    }

    .input-box textarea{
        resize: none;
        height: 100px;
    }

    .input-box input:focus,
    .input-box textarea:focus{
        border: 1px solid #8d1f24;
    }

    .signup-btn{
    width: 100%;
    padding: 16px;
    border: none;
    background: #8d1f24;
    color: white;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    font-size: 15px;

    display: block;
    text-align: center;
    text-decoration: none;
}

.signup-btn:hover{
    background: black;
}

    .signup-btn:hover{
        background: black;
    }

    .back-btn{
        width: 100%;
        padding: 16px;
        border: 1px solid #8d1f24;
        background: transparent;
        color: white;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
        font-size: 15px;
    }

    .back-btn:hover{
        background: #8d1f24;
    }

</style>

</html>
